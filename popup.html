<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TrashBlock</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>TrashBlock</h1>

    <section>
      <h2>Unlock Phrase</h2>
      <div class="row">
        <input type="text" id="phraseInput" placeholder="Type your unlock phrase...">
        <button id="savePhrase">Save</button>
      </div>
      <p class="hint" id="phraseStatus"></p>
    </section>

    <section>
      <h2>Active Days</h2>
      <div class="day-selector" id="daySelector">
        <button class="day-btn" data-day="1">Mon</button>
        <button class="day-btn" data-day="2">Tue</button>
        <button class="day-btn" data-day="3">Wed</button>
        <button class="day-btn" data-day="4">Thu</button>
        <button class="day-btn" data-day="5">Fri</button>
        <button class="day-btn" data-day="6">Sat</button>
        <button class="day-btn" data-day="0">Sun</button>
      </div>
      <p class="hint" id="dayStatus"></p>
    </section>

    <section>
      <h2>Blocked Sites</h2>
      <div class="row">
        <input type="text" id="siteInput" placeholder="example.com">
        <button id="addSite">Add</button>
      </div>
      <ul id="siteList"></ul>
      <p class="empty" id="emptyMsg">No sites blocked yet.</p>
    </section>

    <section>
      <h2>Temporarily Unlocked</h2>
      <ul id="unlockedList"></ul>
      <p class="empty" id="unlockedEmpty">No sites currently unlocked.</p>
    </section>
  </div>

<script src="popup.js"></script>
</body>
</html>
