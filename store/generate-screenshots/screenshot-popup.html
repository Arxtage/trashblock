<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Screenshot: Popup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px; height: 800px;
      background: #12121f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 400px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      background: #1a1a2e;
      padding: 20px;
      color: #e0e0e0;
      font-size: 14px;
    }
    .card h1 {
      font-size: 1.3rem;
      color: #e94560;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }
    section { margin-bottom: 16px; }
    .row {
      display: flex;
      gap: 6px;
    }
    .row input {
      flex: 1;
      padding: 8px 10px;
      font-size: 13px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      outline: none;
    }
    button {
      padding: 8px 14px;
      font-size: 13px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    .hint {
      font-size: 12px;
      color: #4ecca3;
      margin-top: 4px;
      min-height: 16px;
    }
    ul { list-style: none; margin-top: 8px; }
    ul li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: #16213e;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    ul li .domain-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    ul li button {
      padding: 2px 8px;
      font-size: 11px;
      background: #333;
      margin-left: 8px;
    }
    .day-selector { display: flex; gap: 6px; justify-content: space-between; }
    .day-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid #333; background: #16213e; color: #888;
      font-size: 11px; font-weight: 600; padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .day-btn.selected { background: #e94560; border-color: #e94560; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TrashBlock</h1>

    <section>
      <h2>Unlock Phrase</h2>
      <div class="row">
        <input type="text" value="I should be working on something productive" readonly>
        <button>Save</button>
      </div>
      <p class="hint">Phrase saved.</p>
    </section>

    <section>
      <h2>Active Days</h2>
      <div class="day-selector">
        <div class="day-btn selected">Mon</div>
        <div class="day-btn selected">Tue</div>
        <div class="day-btn selected">Wed</div>
        <div class="day-btn selected">Thu</div>
        <div class="day-btn selected">Fri</div>
        <div class="day-btn">Sat</div>
        <div class="day-btn">Sun</div>
      </div>
    </section>

    <section>
      <h2>Blocked Sites</h2>
      <div class="row">
        <input type="text" placeholder="example.com">
        <button>Add</button>
      </div>
      <ul>
        <li><span class="domain-name">twitter.com</span><button>Remove</button></li>
        <li><span class="domain-name">reddit.com</span><button>Remove</button></li>
        <li><span class="domain-name">youtube.com</span><button>Remove</button></li>
        <li><span class="domain-name">tiktok.com</span><button>Remove</button></li>
      </ul>
    </section>
  </div>
</body>
</html>
