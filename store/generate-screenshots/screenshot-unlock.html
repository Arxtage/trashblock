<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Screenshot: Unlock Success</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px; height: 800px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      width: 90%;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 2.5rem;
      color: #e94560;
      margin-bottom: 8px;
    }
    .domain {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 32px;
    }
    .instruction {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 20px;
    }
    .phrase {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 1.15rem;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      letter-spacing: 0.3px;
      margin-bottom: 24px;
      color: #ccc;
      line-height: 1.6;
      text-align: justify;
    }
    .input-mock {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.1rem;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      background: #0f3460;
      border: 2px solid #4ecca3;
      border-radius: 8px;
      color: #e0e0e0;
      text-align: left;
    }
    .feedback {
      margin-top: 16px;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 1.15rem;
      letter-spacing: 0.3px;
      line-height: 1.6;
      text-align: justify;
    }
    .correct { color: #4ecca3; }
    .status {
      margin-top: 20px;
      font-size: 1.1rem;
      color: #4ecca3;
      font-weight: 600;
    }
    .status-icon {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: #4ecca3;
      border-radius: 50%;
      color: #1a1a2e;
      font-weight: bold;
      line-height: 24px;
      text-align: center;
      font-size: 14px;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Blocked</h1>
    <p class="domain">twitter.com</p>
    <p class="instruction">Type the phrase below exactly to unlock this site for 10 minutes.</p>
    <div class="phrase">I should be working on something productive</div>
    <div class="input-mock">I should be working on something productive</div>
    <div class="feedback">
      <span class="correct">I should be working on something productive</span>
    </div>
    <p class="status"><span class="status-icon">&#10003;</span> Unlocked for 10 minutes. Redirecting...</p>
  </div>
</body>
</html>
